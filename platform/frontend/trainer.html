<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lingvo - Language Trainer</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./trainer.css" />
    <link rel="stylesheet" href="./topic-lesson-visuals.css" />
  </head>
  <body>
    <header class="portal-top portal-top--trainer">
      <nav class="portal-nav-cluster" aria-label="Розділи">
        <a class="portal-home-link" href="./landing.html">Головна</a>
        <a class="portal-home-link" href="./portal.html">Портал</a>
        <a class="portal-home-link" href="./project.html">Платформа</a>
      </nav>
      <button type="button" class="portal-theme-toggle" id="portalThemeToggle" aria-pressed="false">
        <span aria-hidden="true">◐</span>
        <span id="portalThemeToggleLabel">Світла</span>
      </button>
    </header>
    <main class="app-shell">
      <header class="app-header">
        <h1>Lingvo: Language from Zero</h1>
        <p>Тренажер спілкування з нуля</p>
        <div class="trainer-top-tools">
          <div class="trainer-owl-badge" role="img" aria-label="Сова">
            <span class="trainer-owl-icon" aria-hidden="true">🦉</span>
          </div>
          <label class="trainer-variant-label" for="trainerLearningLanguageSelect">
            Мова навчання:
            <select id="trainerLearningLanguageSelect" class="trainer-variant-select" data-learning-language-select></select>
          </label>
          <label class="trainer-variant-label" for="trainerVariantSelect">
            Стиль тренажера:
            <select id="trainerVariantSelect" class="trainer-variant-select">
              <option value="neon-mentor">Neon Mentor</option>
              <option value="command-center">Command Center Owl</option>
              <option value="ai-classroom">AI Classroom Glass</option>
              <option value="cyber-lab">Cyber Lab</option>
              <option value="hybrid-owl">Hybrid Owl</option>
            </select>
          </label>
        </div>
        <div class="trainer-topic-tools" aria-label="Режим оформлення уроку">
          <label class="topic-visual-label" for="topicFormatSelect">
            Вигляд за темою:
            <select id="topicFormatSelect" class="trainer-variant-select">
              <option value="auto">Авто</option>
              <option value="vocab">Словник / числа</option>
              <option value="commands">Команди / процедури</option>
              <option value="dialogue">Діалог / фрази</option>
            </select>
          </label>
          <label class="topic-visual-label" for="topicPaletteSelect">
            Палітра:
            <select id="topicPaletteSelect" class="trainer-variant-select">
              <option value="auto">Авто (до теми)</option>
              <option value="pastel">Pastel</option>
              <option value="vibrant">Vibrant</option>
              <option value="monochrome">Monochrome</option>
            </select>
          </label>
        </div>
      </header>

      <section class="status-panel" aria-live="polite">
        <div class="status-item">Рівень: <span id="levelLabel">A0</span></div>
        <div class="status-item">Правильних: <span id="correctCount">0</span></div>
        <div class="status-item">Спроб: <span id="attemptCount">0</span></div>
      </section>

      <div class="trainer-main-stage trainer-main-stage--no-rail">
        <aside id="trainerSceneMount" class="trainer-scene-mount trainer-scene-rail" aria-label="Сцени до діалогів"></aside>
        <div class="trainer-chat-wrap">
          <section id="chatContainer" class="chat-container" aria-label="Чат з ботом"></section>
        </div>
      </div>

      <section class="controls">
        <div class="lesson-picker-row">
          <label class="input-label" for="lessonSelect">Обери урок для старту</label>
          <div class="lesson-picker-controls">
            <select id="lessonSelect" aria-label="Вибір уроку"></select>
            <button id="startLessonButton" type="button">Почати з цього уроку</button>
          </div>
        </div>
        <div id="taskPrompt" class="task-prompt" aria-live="polite">Завантаження завдання...</div>
        <label class="input-label" for="userInput">Твоя відповідь</label>
        <div class="input-row">
          <input id="userInput" type="text" placeholder="Напиши мовою уроку або українською..." autocomplete="off" />
          <button id="sendButton" type="button">Надіслати</button>
        </div>
        <div class="secondary-actions">
          <button id="dictionaryButton" type="button">Показати словник теми</button>
          <button id="dictionaryMoreButton" type="button">Показати ще</button>
          <button id="translationToggleButton" type="button">Ховати підказки перекладу</button>
          <button id="lessonButton" type="button">Пояснення уроку ще раз</button>
          <button id="speakButton" type="button">Озвучити останню фразу</button>
          <button id="resetButton" type="button">Скинути прогрес</button>
        </div>
      </section>
    </main>

    <script src="./theme.js"></script>
    <script src="./learning-language.js"></script>
    <script src="./topicLessonVisuals.js"></script>
    <script src="./lessonScenes.js"></script>
    <script src="./trainer-page.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
