  <text x="36" y="52" fill="#3f3a33" font-family="Georgia, serif" font-size="30">Lesson 2 • Where are you from?</text>
  <line x1="36" y1="66" x2="684" y2="66" stroke="#c9bea9" stroke-width="2"/>
  <rect x="44" y="88" width="190" height="106" rx="10" fill="#4c6a82"/>
  <text x="84" y="150" fill="#f8fafc" font-family="Georgia, serif" font-size="34">UKRAINE</text>
  <path d="M258 142 H416" stroke="#c18f2c" stroke-width="8" marker-end="url(#arrow)"/>
  <rect x="432" y="102" width="210" height="80" rx="10" fill="#5b7a5f"/>
  <text x="498" y="152" fill="#f8fafc" font-family="Georgia, serif" font-size="34">KYIV</text>
  <text x="36" y="236" fill="#6c6256" font-family="Georgia, serif" font-size="20">Use: I am from ... / I live in ...</text>
