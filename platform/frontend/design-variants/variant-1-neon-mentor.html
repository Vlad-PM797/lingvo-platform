<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Варіант 1 — Numbers (workbook style)</title>
  <link rel="stylesheet" href="./workbook.css" />
</head>
<body>
  <main class="sheet">
    <header class="header">
      <div>
        <h1>NUMBERS [намбез] — ЧИСЛА</h1>
        <p class="mono-note">Зразок сторінки у стилі підручника</p>
      </div>
      <div class="owl-tag">🦉</div>
    </header>

    <section class="two-col">
      <ol class="vocab-list">
        <li>One <span>— один</span></li>
        <li>Two <span>— два</span></li>
        <li>Three <span>— три</span></li>
        <li>Four <span>— чотири</span></li>
        <li>Five <span>— п'ять</span></li>
        <li>Six <span>— шість</span></li>
        <li>Seven <span>— сім</span></li>
        <li>Eight <span>— вісім</span></li>
      </ol>
      <div class="frame">
        <svg viewBox="0 0 420 300" xmlns="http://www.w3.org/2000/svg">
          <rect width="420" height="300" fill="#fff"/>
          <rect x="40" y="35" width="240" height="165" fill="none" stroke="#111" stroke-width="4"/>
          <text x="58" y="78" font-size="38" font-family="Arial">1 - One</text>
          <text x="58" y="122" font-size="38" font-family="Arial">2 - Two</text>
          <text x="58" y="166" font-size="38" font-family="Arial">3 - Three</text>
          <circle cx="340" cy="90" r="36" fill="none" stroke="#111" stroke-width="4"/>
          <circle cx="327" cy="84" r="6" fill="#111"/><circle cx="353" cy="84" r="6" fill="#111"/>
          <polygon points="340,98 332,112 348,112" fill="#111"/>
          <rect x="305" y="130" width="70" height="92" fill="none" stroke="#111" stroke-width="4"/>
          <line x1="340" y1="222" x2="320" y2="262" stroke="#111" stroke-width="4"/>
          <line x1="340" y1="222" x2="360" y2="262" stroke="#111" stroke-width="4"/>
        </svg>
      </div>
    </section>

    <h2 class="section-title">RHYME</h2>
    <p class="rhyme">
      One — a cat,<br/>
      Two — a bat,<br/>
      Three — a dog,<br/>
      Four — a frog.
    </p>
  </main>
</body>
<script src="./palette-switcher.js"></script>
</html>
