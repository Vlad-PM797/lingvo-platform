services:
  - type: web
    name: lingvo-backend
    runtime: docker
    rootDir: backend
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      # GitHub Pages + локальна розробка (додай свій домен через кому при потребі)
      - key: CORS_ALLOWED_ORIGINS
        value: https://vlad-pm797.github.io,http://localhost:5173,http://127.0.0.1:5500,http://localhost:3000
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL_DAYS
        value: 30
